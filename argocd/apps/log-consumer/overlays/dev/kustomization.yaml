apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - target:
      kind: Application
      name: log-consumer
    patch: |-
      - op: replace
        path: /metadata/name
        value: log-consumer-dev
      - op: replace
        path: /spec/source/path
        value: apps/log-consumer/overlays/dev

# Strimzi Kafka Operator Production Configuration
watchNamespaces:
- kafka

kafka:
  cluster:
    enabled: true
    name: kafka-cluster
    replicas: 3
    version: 4.2.0

    storage:
      type: persistent-claim
      size: 100Gi
      deleteClaim: false

    resources:
      requests:
        cpu: "2"
        memory: 8Gi
      limits:
        cpu: "4"
        memory: 12Gi

    listeners:
    - name: plain
      port: 9092
      type: internal
      tls: false

    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      auto.create.topics.enable: false

zookeeper:
  enabled: false

entityOperator:
  topicOperator:
    resources:
      requests:
        cpu: "0.5"
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi
  userOperator:
    resources:
      requests:
        cpu: "0.5"
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi

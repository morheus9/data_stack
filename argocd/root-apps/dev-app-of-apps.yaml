apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-stack-dev
  namespace: argocd
spec:
  project: data-stack
  source:
    repoURL: https://github.com/your-org/data_stack.git
    targetRevision: main
    path: argocd/applications/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
